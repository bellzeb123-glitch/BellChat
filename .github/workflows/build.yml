name: Build BellChat

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Paper 26.2 API = Java 25 bytecode — JDK 21 daje "cannot access org.bukkit.*"
      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install bell-hub-api
        run: |
          git clone --depth 1 https://github.com/bellzeb123-glitch/bell-hub-api.git /tmp/bell-hub-api
          mvn -f /tmp/bell-hub-api/pom.xml install -DskipTests -B -q

      - name: Build with Maven
        run: mvn -B clean package -DskipTests -q

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: BellChat
          path: target/BellChat-*.jar
          retention-days: 30
