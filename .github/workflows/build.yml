name: Build BellChat

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Clone BellHub (bell-hub-api source)
        run: git clone --depth 1 https://github.com/bellzeb123-glitch/BellHub.git BellHub

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install bell-hub-api
        run: mvn -B -f bell-hub-api/pom.xml clean install -DskipTests -q

      - name: Build with Maven
        run: mvn -B clean package -DskipTests -q

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: BellChat
          path: target/BellChat.jar
          retention-days: 30
