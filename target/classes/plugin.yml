name: BellChat
version: '1.26.1.2'
main: pl.bell.bellchat.BellChat
api-version: '1.21'
author: bellzeb123-glitch
description: Full-featured chat plugin with channels, emoji, URL filter and broadcasts.

softdepend:
  - LuckPerms
  - PlaceholderAPI

commands:
  bellchat:
    description: BellChat admin panel and commands
    aliases: [bch]
    usage: /bch [help|gui|reload|mute|unmute|clearchat|chatlock|spy|ch|lang]
  ch:
    description: Switch chat channel
    usage: /ch [kanal|list]
  msg:
    description: Send a private message
    aliases: [tell, w, pm]
    usage: /msg <player> <message>
  reply:
    description: Reply to last private message
    aliases: [r]
    usage: /r <message>
  ignore:
    description: Ignore or unignore a player
    usage: /ignore <player>
  mute:
    description: Mute a player
    usage: /mute <player> [duration] [reason]
  unmute:
    description: Unmute a player
    usage: /unmute <player>
  clearchat:
    description: Clear the chat
    aliases: [cc]
    usage: /clearchat
  chatlock:
    description: Lock or unlock the chat
    aliases: [cl]
    usage: /chatlock
  msgspy:
    description: Toggle private message spy
    aliases: [spy]
    usage: /msgspy
  afk:
    description: Toggle your AFK status
    usage: /afk

permissions:
  bellchat.admin:
    description: Full admin access
    default: op
  bellchat.mute:
    description: Can mute players
    default: op
  bellchat.clearchat:
    description: Can clear chat
    default: op
  bellchat.chatlock:
    description: Can lock chat
    default: op
  bellchat.chatlock.bypass:
    description: Can chat when locked
    default: op
  bellchat.color:
    description: Can use color codes in chat
    default: false
  bellchat.mention:
    description: Can be pinged by mentions
    default: true
  bellchat.antispam.bypass:
    description: Bypasses antispam
    default: op
  bellchat.spy:
    description: Can see all private messages
    default: op
  bellchat.url.bypass:
    description: Can send links
    default: op
  bellchat.emoji:
    description: Can use emoji in chat
    default: true
  bellchat.channel.global:
    description: Access to Global channel
    default: true
  bellchat.channel.local:
    description: Access to Local channel
    default: true
  bellchat.channel.party:
    description: Access to Party channel
    default: true
  bellchat.channel.vip:
    description: Access to VIP channel
    default: false
  bellchat.channel.admin:
    description: Access to Admin channel
    default: op
  bellchat.afk.kick.bypass:
    description: Not affected by AFK auto-kick
    default: op
