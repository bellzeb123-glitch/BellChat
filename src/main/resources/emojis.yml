# ============================================================
#  BellChat - Emoji Configuration
# ============================================================
# Wpisz shortcode: 'emoji' aby dodać własne.
# Shortcody są case-sensitive: :smile: ≠ :Smile:
# Wyłącz cały system: enabled: false
# Uprawnienie do używania: bellchat.emoji (domyślnie: true dla graczy)

enabled: true

