# ============================================================
#  BellChat v2.2 - Messages (English)
# ============================================================
prefix: "&8[&6BellChat&8] "

# ── Private messages ─────────────────────────────────────────
msg-player-offline: "&cPlayer &f{player} &cis not online."
msg-no-reply: "&cYou have no one to reply to."
msg-self: "&cYou cannot message yourself."
msg-ignored: "&cYou are ignoring &f{player}&c."
msg-ignored-by: "&c&f{player} &cis ignoring you."
msg-format-sender: "&9[PRIV] &fYou &9→ &f{receiver}&9: &f{message}"
msg-format-receiver: "&9[PRIV] &f{sender} &9→ &fYou&9: &f{message}"
msg-reply-to: "&8[&9→ &f{receiver}&8]"
msg-spy-format: "&8[SPY] &7{sender} &8→ &7{receiver}&8: &7{message}"

# ── Mute ─────────────────────────────────────────────────────
mute-success: "&aYou muted &f{player}&a for &f{duration}&a. Reason: &f{reason}"
mute-permanent: "&aYou permanently muted &f{player}&a. Reason: &f{reason}"
mute-notify: "&cYou were muted for &f{duration}&c. Reason: &f{reason}"
mute-notify-permanent: "&cYou were permanently muted."
mute-already: "&c&f{player} &cis already muted."
mute-blocked: "&cYou are muted. &7Expires in: &f{remaining}"
mute-blocked-permanent: "&cYou are permanently muted."
unmute-success: "&aYou unmuted &f{player}&a."
unmute-not-muted: "&c&f{player} &cis not muted."

# ── Chat ─────────────────────────────────────────────────────
clearchat-done: "&aChat cleared by &f{player}&a."
chatlock-locked: "&cChat was &4locked &cby &f{player}&c."
chatlock-unlocked: "&aChat was &2unlocked &aby &f{player}&a."
chatlock-blocked: "&cChat is currently locked."

# ── Ignore ───────────────────────────────────────────────────
ignore-added: "&aYou are now ignoring &f{player}&a."
ignore-removed: "&aYou are no longer ignoring &f{player}&a."
ignore-self: "&cYou cannot ignore yourself."
ignore-list-header: "&8=== &6Ignored Players &8==="
ignore-list-empty: "&7You are not ignoring anyone."

# ── Antispam ─────────────────────────────────────────────────
antispam-cooldown: "&cWait &f{seconds}s &cbefore sending another message."
antispam-duplicate: "&cDo not send the same message twice."

# ── URL Filter ───────────────────────────────────────────────
url-blocked: "&cLinks are not allowed in chat."

# ── General ──────────────────────────────────────────────────
no-permission: "&cYou do not have permission."
player-only: "&cOnly players can use this command."
invalid-args: "&cInvalid arguments. Use &f/bc help"
reload-done: "&aConfiguration reloaded."

# ── v2.0: Channels ───────────────────────────────────────────
channel-not-found: "&cChannel &f{channel} &cnot found."
channel-disabled: "&cChannel &f{channel} &cis disabled."
channel-switched: "&7Switched to channel &f{channel}&7."
channel-current: "&7Current channel: &f{channel}&7."
channel-party-not-member: "&cYou are not a member of this party."
channel-party-disbanded: "&cThe party was disbanded."
