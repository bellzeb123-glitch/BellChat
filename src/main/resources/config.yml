# ============================================================
#  BellChat v2.0 - Configuration
# ============================================================

language: "pl"

# ── Chat Format (fallback dla gracza bez grupy w LP) ──────────
chat-format: "&f{player}&f: {message}"

# Formaty per-grupa LuckPerms.
# {prefix} = prefix z LP (§-kody stripowane, kolor z formatu decyduje)
# {player} = czysta nazwa gracza
# {message} = zawsze biały (&f) — wymuszony z kodu, nie pisz tu koloru
#
# WAŻNE dla VIP: &5 przed {prefix} I przed {player} sprawia że
# CAŁY nick (prefix + nazwa) jest fioletowy. Wiadomość zostaje biała.
group-formats:
  default: "&f{player}&f: {message}"
  vip:     "&5{prefix}&5{player}&5:&f {message}"
  admin:   "&6{prefix}&6{player}&6:&f {message}"

# ── Private Messages ──────────────────────────────────────────
msg-format-sender:   "&9[PRIV] &fTy &9→ &f{receiver}&9: &f{message}"
msg-format-receiver: "&9[PRIV] &f{sender} &9→ &fTy&9: &f{message}"

# ── Antispam ──────────────────────────────────────────────────
antispam:
  enabled: false
  cooldown-seconds: 3
  block-duplicate: true

# ── Mention Ping ──────────────────────────────────────────────
mention:
  enabled: true
  sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
  highlight-color: "&e@"

# ── Profanity Filter ──────────────────────────────────────────
profanity-filter:
  enabled: false
  replacement: "***"
  words:
    - "badword1"
    - "badword2"

# ── VIP Rank Notification ─────────────────────────────────────
vip-notification:
  enabled: true
  message: "&6✦ &e{player} &6dołączył do rankingu VIP! &6✦"
  vip-group: "vip"

# ── Chat Lock ─────────────────────────────────────────────────
chatlock:
  locked-message: "&cChat jest aktualnie zablokowany."

# ── v2.0: Kanały ──────────────────────────────────────────────
# Placeholdery: {prefix} {player} {message} {channel}
# {message} zawsze biały z kodu — nie dodawaj &f przy {message}
# {prefix} — §-kody stripowane, kolor z formatu decyduje
channels:
  global:
    type: GLOBAL
    display-name: "&aGlobal"
    # Global używa group-formats — ten format to fallback
    format: "&f{player}&f: {message}"
    enabled: true

  local:
    type: LOCAL
    display-name: "&eLocal"
    format: "&8[&eL&8] &f{player}&f: {message}"
    local-radius: 100
    enabled: true

  vip:
    type: VIP
    display-name: "&5VIP"
    # &5 przed {prefix} i {player} → fioletowy prefix LP + fioletowy nick
    # &f przed {message} → biała wiadomość (kod też to wymusza, dla pewności)
    format: "&8[&5VIP&8] &5{prefix}&5{player}&5:&f {message}"
    required-permission: "bellchat.channel.vip"
    enabled: true

  admin:
    type: ADMIN
    display-name: "&cAdmin"
    format: "&8[&cADM&8] &6{prefix}&6{player}&6:&f {message}"
    required-permission: "bellchat.channel.admin"
    enabled: true
