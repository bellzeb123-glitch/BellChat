# ============================================================
#  BellChat v2.1 - Configuration
# ============================================================

language: "pl"

# ── Chat Format ───────────────────────────────────────────────
chat-format: "&f{player}&f: {message}"

group-formats:
  default: "&f{player}&f: {message}"
  vip:     "&5{prefix}&5{player}&5:&f {message}"
  admin:   "&6{prefix}&6{player}&6:&f {message}"

# ── Private Messages ──────────────────────────────────────────
msg-format-sender:   "&9[PRIV] &fTy &9→ &f{receiver}&9: &f{message}"
msg-format-receiver: "&9[PRIV] &f{sender} &9→ &fTy&9: &f{message}"

# ── Antispam ──────────────────────────────────────────────────
antispam:
  enabled: false
  cooldown-seconds: 3
  block-duplicate: true

# ── Mention Ping ──────────────────────────────────────────────
mention:
  enabled: true
  sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
  highlight-color: "&e@"

# ── Profanity Filter ──────────────────────────────────────────
profanity-filter:
  enabled: false
  replacement: "***"
  words:
    - "badword1"
    - "badword2"

# ── URL Filter ────────────────────────────────────────────────
# Blokuje lub zamienia linki w chacie.
# Bypass: bellchat.url.bypass (domyślnie: op)
url-filter:
  enabled: false
  # block  = odrzuca całą wiadomość zawierającą link
  # replace = zamienia link na tekst z 'replacement'
  mode: "block"
  replacement: "&8[&clink&8]"
  # Domeny/frazy które są DOZWOLONE (gracz może pisać te linki)
  whitelist:
    - "twojserwer.pl"
    # - "discord.gg/twojlink"

# ── VIP Rank Notification ─────────────────────────────────────
vip-notification:
  enabled: true
  message: "&6✦ &e{player} &6dołączył do rankingu VIP! &6✦"
  vip-group: "vip"

# ── Chat Lock ─────────────────────────────────────────────────
chatlock:
  locked-message: "&cChat jest aktualnie zablokowany."

# ── Auto-Broadcasts ───────────────────────────────────────────
# Cykliczne wiadomości wysyłane na cały serwer.
# Każdy slot = osobny timer, własna lista wiadomości.
# random: false = kolejno (1→2→3→1→...), true = losowo
broadcasts:
  enabled: false
  slots:
    slot1:
      enabled: true
      interval-seconds: 300
      random: false
      messages:
        - "&8[&6Bell&8] &fZapraszamy na nasz serwer Discord!"
        - "&8[&6Bell&8] &fSprawdź sklep: &e/bm"
    slot2:
      enabled: false
      interval-seconds: 600
      random: true
      messages:
        - "&8[&6Bell&8] &fDołącz do VIP aby odblokować ekskluzywne funkcje!"

# ── v2.0: Kanały ──────────────────────────────────────────────
channels:
  global:
    type: GLOBAL
    display-name: "&aGlobal"
    format: "&f{player}&f: {message}"
    enabled: true

  local:
    type: LOCAL
    display-name: "&eLocal"
    format: "&8[&eL&8] &f{player}&f: {message}"
    local-radius: 100
    enabled: true

  vip:
    type: VIP
    display-name: "&5VIP"
    format: "&8[&5VIP&8] &5{prefix}&5{player}&5:&f {message}"
    required-permission: "bellchat.channel.vip"
    enabled: true

  admin:
    type: ADMIN
    display-name: "&cAdmin"
    format: "&8[&cADM&8] &6{prefix}&6{player}&6:&f {message}"
    required-permission: "bellchat.channel.admin"
    enabled: true
