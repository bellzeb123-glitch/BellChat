name: BellChat
version: 2.1.0
main: pl.bell.bellchat.BellChat
api-version: '1.21'
author: bellzeb123-glitch
description: Full-featured chat plugin with channels, emoji, URL filter and broadcasts.

softdepend:
  - LuckPerms
  - PlaceholderAPI

commands:
  bellchat:
    description: BellChat admin panel i komendy admina
    aliases: [bc]
    usage: /bc [help|gui|reload|mute|unmute|clearchat|chatlock|spy|ch]
  ch:
    description: Zmien kanal czatu
    usage: /ch [kanal|list]
  msg:
    description: Wyslij prywatna wiadomosc
    aliases: [tell, w, pm]
    usage: /msg <gracz> <wiadomosc>
  reply:
    description: Odpowiedz na ostatnia PM
    aliases: [r]
    usage: /r <wiadomosc>
  ignore:
    description: Ignoruj lub odignoruj gracza
    usage: /ignore <gracz>
  mute:
    description: Wycisz gracza
    usage: /mute <gracz> [czas] [powod]
  unmute:
    description: Odcisz gracza
    usage: /unmute <gracz>
  clearchat:
    description: Wyczysc chat
    aliases: [cc]
    usage: /clearchat
  chatlock:
    description: Zablokuj lub odblokuj chat
    aliases: [cl]
    usage: /chatlock
  msgspy:
    description: Toggle spy na prywatne wiadomosci
    aliases: [spy]
    usage: /msgspy

permissions:
  bellchat.admin:
    description: Pelny dostep admina
    default: op
  bellchat.mute:
    description: Moze wyciszac graczy
    default: op
  bellchat.clearchat:
    description: Moze czyscic chat
    default: op
  bellchat.chatlock:
    description: Moze blokowac chat
    default: op
  bellchat.chatlock.bypass:
    description: Moze pisac gdy chat zablokowany
    default: op
  bellchat.color:
    description: Moze uzywac kodow kolorow w chacie
    default: false
  bellchat.mention:
    description: Moze byc pingowany przez wzmiankę
    default: true
  bellchat.antispam.bypass:
    description: Omija antispam
    default: op
  bellchat.spy:
    description: Widzi wszystkie prywatne wiadomosci
    default: op
  bellchat.url.bypass:
    description: Moze wysylac linki
    default: op
  bellchat.emoji:
    description: Moze uzywac emoji w chacie
    default: true
  bellchat.channel.global:
    description: Dostep do kanalu Global
    default: true
  bellchat.channel.local:
    description: Dostep do kanalu Local
    default: true
  bellchat.channel.party:
    description: Dostep do kanalu Party
    default: true
  bellchat.channel.vip:
    description: Dostep do kanalu VIP
    default: false
  bellchat.channel.admin:
    description: Dostep do kanalu Admin
    default: op
