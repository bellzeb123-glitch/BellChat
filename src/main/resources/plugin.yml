name: BellChat
version: 2.0.0
main: pl.bell.bellchat.BellChat
api-version: '1.21'
author: bellzeb123-glitch
description: Full-featured chat plugin with channels, LuckPerms integration.

softdepend:
  - LuckPerms
  - PlaceholderAPI

commands:
  bellchat:
    description: BellChat admin panel i komendy admina
    aliases: [bc]
    usage: /bc [help|gui|reload|mute|unmute|clearchat|chatlock|spy|ch]

  ch:
    description: Zmień kanał czatu
    usage: /ch [kanał|list]

  msg:
    description: Wyślij prywatną wiadomość
    aliases: [tell, w, pm]
    usage: /msg <gracz> <wiadomość>

  reply:
    description: Odpowiedz na ostatnią prywatną wiadomość
    aliases: [r]
    usage: /r <wiadomość>

  ignore:
    description: Ignoruj lub odignoruj gracza
    usage: /ignore <gracz>

  # Legacy standalone — wciąż działają bezpośrednio (backwards compat)
  mute:
    description: Wycisz gracza
    usage: /mute <gracz> [czas] [powód]

  unmute:
    description: Odcisz gracza
    usage: /unmute <gracz>

  clearchat:
    description: Wyczyść czat
    aliases: [cc]
    usage: /clearchat

  chatlock:
    description: Zablokuj/odblokuj czat
    aliases: [cl]
    usage: /chatlock

  msgspy:
    description: Przełącz tryb spy dla prywatnych wiadomości
    aliases: [spy]
    usage: /msgspy

permissions:
  bellchat.admin:
    description: Pełny dostęp administracyjny
    default: op
  bellchat.mute:
    description: Może wyciszać graczy
    default: op
  bellchat.clearchat:
    description: Może czyścić czat
    default: op
  bellchat.chatlock:
    description: Może blokować czat
    default: op
  bellchat.chatlock.bypass:
    description: Może pisać gdy czat jest zablokowany
    default: op
  bellchat.color:
    description: Może używać kodów kolorów w czacie
    default: false
  bellchat.mention:
    description: Może być pingowany przez @wzmianki
    default: true
  bellchat.antispam.bypass:
    description: Omija antispam
    default: op
  bellchat.spy:
    description: Widzi prywatne wiadomości innych graczy
    default: op
  bellchat.channel.vip:
    description: Dostęp do kanału VIP
    default: false
  bellchat.channel.admin:
    description: Dostęp do kanału Admin
    default: op
  bellchat.channel.party:
    description: Może tworzyć i dołączać do party
    default: true
